name: Reusable — Update GitOps Image Tag

# Shared reusable workflow — same copy lives in zen-pharma-backend.
# Called by the frontend CI after a successful image push to ECR.
on:
  workflow_call:
    inputs:
      service-name:
        description: "Service name (e.g. pharma-ui)"
        required: true
        type: string
      image-tag:
        description: "Docker image tag (git SHA)"
        required: true
        type: string
      gitops-repo:
        description: "GitOps repository in owner/repo format"
        required: true
        type: string
      aws-region:
        description: "AWS region where ECR lives"
        required: true
        type: string
      manifest-path:
        description: "Path inside gitops repo to the manifest containing the image field"
        required: true
        type: string
      ecr-repository:
        description: "ECR repository name"
        required: true
        type: string
    secrets:
      GITOPS_TOKEN:
        required: true
      AWS_ACCOUNT_ID:
        required: true

jobs:
  update-gitops:
    name: Update GitOps (${{ inputs.service-name }})
    runs-on: ubuntu-latest
    steps:
      - name: Determine target environment
        id: target
        run: |
          [[ "${{ github.ref }}" == "refs/heads/main" ]] \
            && echo "environment=prod" >> $GITHUB_OUTPUT \
            || echo "environment=dev" >> $GITHUB_OUTPUT

      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.gitops-repo }}
          token: ${{ secrets.GITOPS_TOKEN }}
          path: zen-gitops

      - name: Update image in K8s manifest
        run: |
          ECR_REGISTRY="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ inputs.aws-region }}.amazonaws.com"
          NEW_IMAGE="${ECR_REGISTRY}/${{ inputs.ecr-repository }}:${{ inputs.image-tag }}"
          MANIFEST="zen-gitops/${{ inputs.manifest-path }}"

          if [[ ! -f "${MANIFEST}" ]]; then
            echo "ERROR: Manifest not found: ${MANIFEST}"
            exit 1
          fi

          sed -i "s|image: .*${{ inputs.ecr-repository }}.*|image: ${NEW_IMAGE}|g" "${MANIFEST}"
          echo "Updated ${MANIFEST} → image: ${NEW_IMAGE}"

      - name: Commit and push
        run: |
          cd zen-gitops
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "ci: update ${{ inputs.service-name }} image to ${{ inputs.image-tag }}

          Repository: ${{ github.repository }}
          Commit: ${{ github.sha }}
          Environment: ${{ steps.target.outputs.environment }}"
            git push
          fi
